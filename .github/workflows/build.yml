name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build index.html
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify build output
        run: |
          test -f index.html
          SIZE=$(stat -c%s index.html)
          echo "Built index.html: $SIZE bytes"
          if [ "$SIZE" -lt 350000 ]; then
            echo "❌ Build output suspiciously small"
            exit 1
          fi
          # Activity count: exactly 85, IDs 1..85 sequential
          python3 - <<'PY'
          import re
          h = open('index.html').read()
          i = h.find('const A = [')
          assert i >= 0, 'const A = [ not found'
          depth, k = 0, i + len('const A = [') - 1
          while k < len(h):
              c = h[k]
              if c == '[': depth += 1
              elif c == ']':
                  depth -= 1
                  if depth == 0: break
              k += 1
          body = h[i:k+1]
          ids = sorted(int(m.group(1)) for m in re.finditer(r'"id":\s*(\d+)', body))
          assert ids == list(range(1, 86)), f'Expected 1..85, got {ids}'
          print(f'Activity check: {len(ids)} IDs 1..85')
          PY
          # Regression guard: these patterns must NOT be present
          if grep -q "maqueen\.showColor" index.html; then
            echo "❌ Regression: maqueen.showColor found (should be strip.showColor)"
            exit 1
          fi
          if grep -q "PingUnit\.Centimeters" index.html; then
            echo "❌ Regression: PingUnit.Centimeters found (should be no argument)"
            exit 1
          fi
          echo "✅ Regression checks passed"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
